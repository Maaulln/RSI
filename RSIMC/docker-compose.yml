services:
  postgres:
    image: postgres:15-alpine
    container_name: darsi_postgres
    environment:
      POSTGRES_USER: darsi_user
      POSTGRES_PASSWORD: darsi_password
      POSTGRES_DB: darsi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U darsi_user -d darsi_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: darsi_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: darsi_backend
    environment:
      DATABASE_URL: postgresql://darsi_user:darsi_password@postgres:5432/darsi_db
      REDIS_URL: redis://redis:6379/0
      DEBUG: "True"
      ENV: development
      SECRET_KEY: dev-secret-key-change-in-production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  kiosk-ui:
    build:
      context: .
      dockerfile: kiosk-ui/Dockerfile
    container_name: darsi_kiosk
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  admin-dashboard:
    build:
      context: .
      dockerfile: admin-dashboard/Dockerfile
    container_name: darsi_admin
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3001:3001"
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    profiles:
      - production
    image: nginx:alpine
    container_name: darsi_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - kiosk-ui
      - admin-dashboard

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: darsi-network
    driver: bridge
